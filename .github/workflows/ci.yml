name: CI-CD Pipeline (Local Deployment)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Build and Test
      - name: Build and Test
        run: mvn clean verify

      #Upload Build Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-order-api-jar
          path: target/*.jar

      # SonarCloud Analysis
      - name: SonarCloud Analysis
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:3.10.0.2594:sonar \
          -Dsonar.projectKey=sysadiya_ci-cd-pipeline-assignment \
          -Dsonar.organization=sysadiya \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        run: docker build -t customer-order-api .

      # Debug Docker Image
      - name: Verify Docker Image
        run: docker images

      # Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag customer-order-api ${{ secrets.DOCKERHUB_USERNAME }}/customer-order-api:latest

      #Debug Tagged Images
      - name: Verify Tagged Image
        run: docker images

      # Push Docker Image
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/customer-order-api:latest

      # Install Ansible + Python dependencies
      - name: Install Ansible and Dependencies
        run: |
          sudo apt update
          sudo apt install -y ansible python3-pip

          python3 -m pip install --upgrade pip
          python3 -m pip install requests docker

      #Install Ansible Docker Collection
      - name: Install Ansible Docker Collection
        run: ansible-galaxy collection install community.docker

      #Deploy using Ansible (LOCALHOST)
      - name: Deploy Locally using Ansible
        run: ansible-playbook ansible/deploy.yml
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}