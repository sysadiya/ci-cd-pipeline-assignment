name: CI-CD Pipeline (Local Deployment)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3️⃣ Build & Test
      - name: Build and Test
        run: mvn clean verify

      # 4️⃣ SonarCloud Analysis
      - name: SonarCloud Analysis
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:3.10.0.2594:sonar \
          -Dsonar.projectKey=sysadiya_ci-cd-pipeline-assignment \
          -Dsonar.organization=sysadiya \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 5️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t customer-order-api .

      # 🔍 Debug Docker Image
      - name: Verify Docker Image
        run: docker images

      # 6️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: |
          docker tag customer-order-api ${{ secrets.DOCKERHUB_USERNAME }}/customer-order-api:latest

      # 🔍 Debug Tagged Images
      - name: Verify Tagged Image
        run: docker images

      # 8️⃣ Push to Docker Hub
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/customer-order-api:latest

      # 9️⃣ Install Ansible
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # 🔟 Install Ansible Docker Collection
      - name: Install Ansible Docker Collection
        run: ansible-galaxy collection install community.docker

      # 🚀 Deploy using Ansible (LOCALHOST)
      - name: Deploy Locally using Ansible
        run: ansible-playbook ansible/deploy.yml
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}