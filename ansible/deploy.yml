- name: Deploy from Docker Hub
  hosts: localhost
  connection: local
  become: true

  vars:
    image_name: "{{ lookup('env', 'DOCKERHUB_USERNAME') }}/customer-order-api:latest"
    container_name: customer-order-api

  tasks:
    - name: Pull latest image from Docker Hub
      community.docker.docker_image:
        name: "{{ image_name }}"
        source: pull

    - name: Stop existing container (if running)
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: stopped
      ignore_errors: yes

    - name: Remove existing container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: yes

    - name: Run new container
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}"
        state: started
        ports:
          - "8080:8080"
